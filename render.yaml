services:
  - type: web
    name: gangs-online-server
    runtime: node
    buildCommand: |
      npm install
      npm run build --workspace=@gangs-online/shared
      npm run build --workspace=@gangs-online/server
      ls -la packages/server/dist
    startCommand: cd packages/server && node dist/index.js
    envVars:
      - key: NODE_VERSION
        value: 18.18.0
