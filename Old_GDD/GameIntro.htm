  <IMG SRC="Image/GameIntro.gif" ALT="遊戲介紹" BORDER="2"><BR>
  <BR>「古惑世紀」是一套在互聯網進行的遊戲。在遊戲中你將會扮演古惑仔在互聯網
      世界橫行無忌，建立組織是你首要的任務，直至統一香港及台灣後，你便是勝利
      者，成為新一代接班人。遊戲提供了充足的空間及自由度讓你擴大自己的勢力範
      圍，無論是做正派或反派，全由你的決定！
  <BR>
